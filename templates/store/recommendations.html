{% extends "store/base.html" %}
{% block content %}
  <div class="container">
    <h1 class="text-center mb-4">Recommended Products</h1>
    <ul class="list-group">
      {% for product in recommendations %}
        <li class="list-group-item">
          <div class="row">
            <div class="col-md-9">
              <h5>
                <a href="{% url 'product_detail' product.id %}">
                  {{ product.name }}
                </a>
              </h5>
              <p class="mb-0">Price: {{ product.final_price }}</p>
            </div>
            <div class="col-md-3 text-right">
              <a class="btn btn-sm btn-primary" href="{% url 'product_detail' product.id %}">View Details</a>
            </div>
          </div>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
