<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
</head>
<body>
    <h1>Customer Reviews and Sentiment Analysis</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Username</th>
                <th>Review</th>
                <th>Sentiment</th>
            </tr>
        </thead>
        <tbody>
            {% for review in reviews %}
            <tr>
                <td>{{ review.user.username }}</td>
                <td>{{ review.review_text }}</td>
                <td>{{ review.sentiment }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
