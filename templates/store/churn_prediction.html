{% extends "store/base.html" %}
{% block content %}

    <h1>Churn Prediction</h1>
    <table>
        <thead>
            <tr>
                <th>Customer ID</th>
                <th>Churn Risk</th>
            </tr>
        </thead>
        <tbody>
            {% for customer in churn_data %}
                <tr>
                    <td>{{ customer.id }}</td>
                    <td>{{ customer.churn_risk }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    {% endblock %}
