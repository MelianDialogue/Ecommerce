{% extends "store/base.html" %}

{% block content %}
  <h1>Search Results for "{{ query }}"</h1>
  <p>Keywords: {{ keywords|join:", " }}</p>
  
  {% if products %}
    <ul>
      {% for product in products %}
        <li>{{ product.name }} - ${{ product.price }}</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No products found.</p>
  {% endif %}
{% endblock %}
